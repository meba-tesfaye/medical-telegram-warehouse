version: 2

models:
  - name: fct_medical_alerts
    description: "Centralized fact table containing extracted medical alerts and pricing data."
    columns:
      - name: alert_key
        data_tests:
          - unique
          - not_null
      - name: channel_key
        data_tests:
          - relationships:
              arguments: # <-- Properly nested under arguments for modern dbt
                to: ref('dim_channels')
                field: channel_key

  - name: dim_channels
    description: "Dimension table containing individual tracking configurations and metadata for the targeted Telegram channels."
    columns:
      - name: channel_key
        data_tests:
          - unique
          - not_null

  - name: fct_image_detections
    description: "Fact table containing object detection and category classifications generated by the YOLO framework on incoming channel images."
    columns:
      - name: image_detection_key
        description: "Primary key / surrogate key generated using an MD5 hash of message_id and channel_name."
        data_tests:
          - unique
          - not_null
      - name: message_id
        description: "The raw identification token for the underlying source Telegram communication entry."